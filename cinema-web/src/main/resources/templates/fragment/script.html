<div th:fragment="script">
  <script th:src="@{/assets/js/jquery-3.3.1.min.js}"></script>
  <script th:src="@{/assets/js/bootstrap.min.js}"></script>
  <script type="text/javascript" th:src="@{/assets/js/contact-us.js}"></script>
  <script type="text/javascript" th:src="@{/assets/js/as-alert-message.min.js}"></script>
  <script th:src="@{/assets/js/theme-change.js}"></script>
  <script th:src="@{/assets/js/jquery-1.9.1.min.js}"></script>
  <script th:src="@{/assets/js/easyResponsiveTabs.js}"></script>
  <script th:src="@{/assets/js/owl.carousel.js}"></script>
  <script th:src="@{/assets/js/jquery.magnific-popup.min.js}"></script>
  <script type="text/javascript" th:src="@{/assets/js/as-alert-message.min.js}"></script>

  <!-- disable body scroll when navbar is active -->
  <script>
    $(function () {
      $('.navbar-toggler').click(function () {
        $('body').toggleClass('noscroll');
      })
    });
  </script>

  <!-- Navbar scroll effect -->
  <script>
    $(window).on("scroll", function () {
      var scroll = $(window).scrollTop();
      if (scroll >= 80) {
        $("#site-header").addClass("nav-fixed");
      } else {
        $("#site-header").removeClass("nav-fixed");
      }
    });

    // Main navigation Active Class Add Remove
    $(".navbar-toggler").on("click", function () {
      $("header").toggleClass("active");
    });

    $(document).on("ready", function () {
      if ($(window).width() > 991) {
        $("header").removeClass("active");
      }
      $(window).on("resize", function () {
        if ($(window).width() > 991) {
          $("header").removeClass("active");
        }
      });
    });
  </script>

  <!-- Responsive Tabs -->
  <script type="text/javascript">
    $(document).ready(function () {
      $('#parentHorizontalTab').easyResponsiveTabs({
        type: 'default',
        width: 'auto',
        fit: true,
        tabidentify: 'hor_1',
        activate: function (event) {
          var $tab = $(this);
          var $info = $('#nested-tabInfo');
          var $name = $('span', $info);
          $name.text($tab.text());
          $info.show();
        }
      });
    });
  </script>

  <!-- Owl Carousel -->
  <script>
    $(document).ready(function () {
      $('.owl-one').owlCarousel({
        stagePadding: 280,
        loop: true,
        margin: 20,
        nav: true,
        responsiveClass: true,
        autoplay: true,
        autoplayTimeout: 5000,
        autoplaySpeed: 1000,
        autoplayHoverPause: false,
        responsive: {
          0: { items: 1, stagePadding: 40, nav: false },
          480: { items: 1, stagePadding: 60, nav: true },
          667: { items: 1, stagePadding: 80, nav: true },
          1000: { items: 1, nav: true }
        }
      });

      $('.owl-three').owlCarousel({
        loop: true,
        margin: 20,
        nav: false,
        responsiveClass: true,
        autoplay: true,
        autoplayTimeout: 5000,
        autoplaySpeed: 1000,
        autoplayHoverPause: false,
        responsive: {
          0: { items: 2, nav: false },
          480: { items: 2, nav: true },
          667: { items: 3, nav: true },
          1000: { items: 5, nav: true }
        }
      });

      $('.owl-mid').owlCarousel({
        loop: true,
        margin: 0,
        nav: false,
        responsiveClass: true,
        autoplay: true,
        autoplayTimeout: 5000,
        autoplaySpeed: 1000,
        autoplayHoverPause: false,
        responsive: {
          0: { items: 1, nav: false },
          480: { items: 1, nav: false },
          667: { items: 1, nav: true },
          1000: { items: 1, nav: true }
        }
      });
    });
  </script>

  <!-- Magnific Popup -->
  <script>
    $(document).ready(function () {
      $('.popup-with-zoom-anim').magnificPopup({
        type: 'inline',
        fixedContentPos: false,
        fixedBgPos: true,
        overflowY: 'auto',
        closeBtnInside: true,
        preloader: false,
        midClick: true,
        removalDelay: 300,
        mainClass: 'my-mfp-zoom-in'
      });

      $('.popup-with-move-anim').magnificPopup({
        type: 'inline',
        fixedContentPos: false,
        fixedBgPos: true,
        overflowY: 'auto',
        closeBtnInside: true,
        preloader: false,
        midClick: true,
        removalDelay: 300,
        mainClass: 'my-mfp-slide-bottom'
      });
    });
  </script>
</div>
